services:
  # Backend FastAPI Service
  - type: web
    name: deepchain-backend
    env: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker api.main:app
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: WEAVIATE_URL
        sync: false
      - key: WEAVIATE_API_KEY
        sync: false
      - key: PORT
        value: 10000

  # Frontend Vite Static Site
  - type: static
    name: deepchain-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: deepchain-backend
          property: host
